<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lampadina Magica</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="wrapper text-white">
        <header class="header text-center">
            <h1 class="header-title">
                La Lampadina Magica
            </h1>
        </header>
        <main class="main">
            <div class="container text-center">
                <p class="subtitle">
                    se provi a cliccare il pulsante indovina un po'... potrai accendere e spegnere la lampadina
                </p>
            </div>
            <div id="lampadinaContainer" class="img-container">
                <img src="./img/white_lamp.png" alt="lampadina spenta">
            </div>
            <div class="button-container">
                <button id="interactiveButton" class="btn">
                    Accendi Lampadina
                </button>
            </div>
        </main>
    </div>

    <script src="./scripts/script.js"></script>
</body>

</html>
